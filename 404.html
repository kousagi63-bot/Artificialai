<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | Stackly</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="assets/css/style.css">

<style>

.error-page{

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

padding:40px 20px;

position:relative;

overflow:hidden;

}

.error-content{

max-width:700px;

z-index:2;

}

.error-code{

font-size:180px;
font-weight:900;
line-height:1;

background:
linear-gradient(
90deg,
#059669,
#14b8a6,
#f43f5e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
glow 4s linear infinite;

}

.error-title{

font-size:48px;
font-weight:700;

color:#fff;

margin:20px 0;

}

.error-text{

font-size:18px;

color:var(--muted);

margin-bottom:40px;

}

.error-actions{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;

}

.error-icon{

font-size:70px;

color:#14b8a6;

margin-bottom:20px;

animation:
float 3s ease-in-out infinite;

}

.error-bg-circle{

position:absolute;

border-radius:50%;

filter:blur(80px);

opacity:.2;

z-index:1;

}

.circle-1{

width:300px;
height:300px;

background:#059669;

top:-100px;
left:-100px;

}

.circle-2{

width:400px;
height:400px;

background:#14b8a6;

bottom:-150px;
right:-150px;

}

.circle-3{

width:250px;
height:250px;

background:#f43f5e;

top:50%;
left:50%;

transform:translate(-50%,-50%);

}

@keyframes glow{

0%{
filter:drop-shadow(0 0 10px rgba(108,99,255,.4));
}

50%{
filter:drop-shadow(0 0 25px rgba(0,229,255,.5));
}

100%{
filter:drop-shadow(0 0 10px rgba(255,77,141,.4));
}

}

@media(max-width:768px){

.error-code{
font-size:120px;
}

.error-title{
font-size:34px;
}

.error-text{
font-size:16px;
}

}

</style>

</head>

<body>

<!-- Background Effects -->

<div class="error-bg-circle circle-1"></div>
<div class="error-bg-circle circle-2"></div>
<div class="error-bg-circle circle-3"></div>

<section class="error-page">

<div class="error-content">

<div class="error-icon">

<i class="fas fa-robot"></i>

</div>

<div class="error-code">

404

</div>

<h1 class="error-title">

Oops! Page Not Found

</h1>

<p class="error-text">

The page you're looking for doesn't exist,
has been moved, or is currently unavailable.

</p>

<div class="error-actions">

<a href="index.html"
class="btn-primary">

<i class="fas fa-home"></i>
&nbsp; Back To Home

</a>

<a href="contact.html"
class="btn-outline">

<i class="fas fa-envelope"></i>
&nbsp; Contact Us

</a>

</div>

<div style="margin-top:50px;color:#7a9a8a;">

Redirecting to Home Page in

<span id="countdown"
style="color:#14b8a6;font-weight:700;">

10

</span>

seconds...

</div>

</div>

</section>

<script>

/* ==========================
AUTO REDIRECT
========================== */

let timeLeft = 10;

const countdown =
document.getElementById("countdown");

const timer = setInterval(() => {

timeLeft--;

countdown.textContent =
timeLeft;

if(timeLeft <= 0){

clearInterval(timer);

window.location.href =
"index.html";

}

}, 1000);

</script>

</body>
</html>
