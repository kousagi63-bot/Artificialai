<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Stackly</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<section class="auth-section">

<div class="auth-container">

<div class="auth-logo">
<a href="index.html">Stackly</a>
</div>

<h1 class="auth-title">
Welcome Back
</h1>

<p class="auth-subtitle">
Login to access your AI dashboard
</p>

<form class="auth-form" id="loginForm">

<input
type="email"
placeholder="Email Address"
required>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password"
required>

<span
class="password-toggle"
id="togglePassword">

🙈

</span>

</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

<label style="color:#7a9a8a;">

<input type="checkbox">

 Remember Me

</label>

<a href="404.html"
style="color:#14b8a6;">

Forgot Password?

</a>

</div>

<button
type="submit"
class="btn-primary auth-btn">

Login

</button>

</form>

<div style="margin:20px 0 15px;padding:15px;background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.2);border-radius:12px;text-align:center;">

<p style="color:#14b8a6;font-size:13px;font-weight:600;margin-bottom:8px;">Demo Credentials</p>

<p style="color:#d1e4d7;font-size:12px;margin-bottom:4px;">
User: <span style="color:#fff;">user@stackly.com</span> / <span style="color:#fff;">user123</span>
</p>

<p style="color:#d1e4d7;font-size:12px;">
Admin: <span style="color:#fff;">admin@stackly.com</span> / <span style="color:#fff;">admin123</span>
</p>

</div>

<div class="auth-divider">

<span>OR</span>

</div>

<div class="social-login">

<a href="404.html"
class="social-btn">

<i class="fab fa-google"></i>

 Google

</a>

<a href="404.html"
class="social-btn">

<i class="fab fa-github"></i>

 GitHub

</a>

</div>

<div class="auth-footer">

Don't have an account?

<a href="signup.html">

Create Account

</a>

</div>

</div>

</section>

<script>

const togglePassword =
document.getElementById("togglePassword");

const password =
document.getElementById("password");

togglePassword.addEventListener(
"click",
() => {

if(password.type === "password"){

password.type = "text";
togglePassword.innerHTML = "👁️";

}else{

password.type = "password";
togglePassword.innerHTML = "🙈";

}

}
);

document
.getElementById("loginForm")
.addEventListener(
"submit",
function(e){

e.preventDefault();

const email = this.querySelector(
'input[type="email"]'
).value.trim();

const pass = document
.getElementById("password").value;

if(email === "user@stackly.com" &&
pass === "user123"){
window.location.href =
"user.html";
}
else if(email === "admin@stackly.com" &&
pass === "admin123"){
window.location.href =
"dashboard.html";
}
else{
alert(
"Invalid credentials. Try:\n\nUser: user@stackly.com / user123\nAdmin: admin@stackly.com / admin123"
);
}

}
);

</script>

</body>
</html>
